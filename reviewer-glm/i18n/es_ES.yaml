        other: "<a href='{{.AnswerUrl}}'>{{.QuestionTitle}}</a><br><br>\n\n{{.DisplayName}}:<br>\n<blockquote>{{.AnswerSummary}}</blockquote><br>\n<a href='{{.AnswerUrl}}'>Verlo en {{.SiteName}}</a><br><br>\n\n--<br>\nNota: Este es un mensaje automático, por favor, no responda a este mensaje ya que su respuesta no será leída.<br><br>\n\n<small><a href='{{.UnsubscribeUrl}}'>Darse de baja</a></small>"
